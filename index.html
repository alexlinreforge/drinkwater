<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>water break</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F1E9DA;
  --bg-deep: #E8DDC8;
  --ink: #1F1B16;
  --ink-soft: #6B5F4E;
  --blue: #3D6B95;
  --blue-soft: #B8C9DD;
  --cream: #FBF6EC;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  font-family: 'Geist', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  min-height: 100dvh; /* iOS Safari: account for dynamic browser chrome */
  overflow-x: hidden;
  position: relative;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* paper texture & ambient blobs */
body::before {
  content: '';
  position: fixed;
  inset: -10%;
  background:
    radial-gradient(circle at 15% 20%, rgba(61, 107, 149, 0.08) 0%, transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(61, 107, 149, 0.06) 0%, transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(232, 221, 200, 0.4) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
  animation: drift 20s ease-in-out infinite;
}

@keyframes drift {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(2%, -1%); }
}

.container {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.25rem;
  text-align: center;
}

.greeting {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 1.3rem;
  color: var(--ink-soft);
  margin-bottom: 0.75rem;
  letter-spacing: -0.01em;
  font-variation-settings: "opsz" 144;
}

.label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.32em;
  color: var(--ink-soft);
  margin-bottom: 1.5rem;
  font-weight: 400;
}

.countdown {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: clamp(5.5rem, 20vw, 13rem);
  line-height: 0.85;
  color: var(--ink);
  font-weight: 300;
  letter-spacing: -0.04em;
  margin-bottom: 1.25rem;
  font-feature-settings: "tnum" 1;
  font-variation-settings: "opsz" 144, "SOFT" 50;
}

.subtitle {
  font-family: 'Fraunces', serif;
  font-size: 1.05rem;
  color: var(--ink-soft);
  margin-bottom: 3.5rem;
  font-style: italic;
  font-weight: 300;
}

.glasses-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 3rem;
  width: 100%;
}

.glasses-caption {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 0.75rem;
  color: var(--ink-soft);
  margin-bottom: 0.75rem;
  letter-spacing: 0.02em;
  opacity: 0.7;
}

.glasses {
  display: flex;
  gap: 0.55rem;
  justify-content: center;
  align-items: flex-end;
  position: relative;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid rgba(31, 27, 22, 0.08);
  user-select: none;
  -webkit-user-select: none;
}

.glass {
  width: 18px;
  height: 28px;
  border: 1.4px solid var(--ink);
  border-top: none;
  border-radius: 0 0 4px 4px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.glass-fill {
  position: absolute;
  left: 1.5px;
  right: 1.5px;
  bottom: 1.5px;
  background: var(--blue);
  border-radius: 0 0 2.5px 2.5px;
  height: 0;
  transition: height 0.55s cubic-bezier(0.34, 1.2, 0.64, 1);
}

/* dim glasses representing hours that haven't happened yet */
.glass.future {
  border-color: rgba(31, 27, 22, 0.22);
}
.glass.past {
  border-color: rgba(31, 27, 22, 0.6);
}

/* highlight the current hour */
.glass.current {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(61, 107, 149, 0.12);
}

.glass-hour {
  font-family: 'Geist', sans-serif;
  font-size: 0.6rem;
  color: var(--ink-soft);
  text-align: center;
  margin-top: 0.4rem;
  letter-spacing: 0.04em;
  opacity: 0.5;
  font-variant-numeric: tabular-nums;
  min-height: 0.7rem;
}

.glass-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.glass-col.current .glass-hour { opacity: 1; color: var(--blue); font-weight: 500; }

/* enlarge touch target on the current-hour glass without changing visual size */
.glass-col.current::before {
  content: '';
  position: absolute;
  inset: -10px -8px;
  cursor: pointer;
  z-index: 1;
}

.controls {
  display: flex;
  gap: 2.25rem;
  font-size: 0.78rem;
  color: var(--ink-soft);
  letter-spacing: 0.03em;
}

.control-btn {
  background: none;
  border: none;
  color: inherit;
  font: inherit;
  font-family: 'Geist', sans-serif;
  cursor: pointer;
  padding: 0.4rem 0;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s, color 0.2s;
}

@media (hover: hover) {
  .control-btn:hover {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }
}
/* touch: give subtle press feedback instead of sticky hover */
.control-btn:active { color: var(--ink); }

/* corner mark */
.corner-mark {
  position: fixed;
  top: max(1.75rem, env(safe-area-inset-top));
  left: max(1.75rem, env(safe-area-inset-left));
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 0.85rem;
  color: var(--ink-soft);
  z-index: 2;
}

.corner-mark .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--blue);
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
  animation: blink 2.4s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.corner-date {
  position: fixed;
  top: max(1.75rem, env(safe-area-inset-top));
  right: max(1.75rem, env(safe-area-inset-right));
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: var(--ink-soft);
  z-index: 2;
}

/* popup overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
  overflow: hidden;
}

.overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.overlay::before {
  content: '';
  position: absolute;
  inset: -20%;
  background:
    radial-gradient(ellipse at 30% 40%, rgba(61, 107, 149, 0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 60%, rgba(61, 107, 149, 0.18) 0%, transparent 55%);
  animation: pulse 4s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.7; }
  50% { transform: scale(1.15) rotate(2deg); opacity: 1; }
}

.overlay-content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem;
  max-width: 600px;
  transform: translateY(30px);
  opacity: 0;
  transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s, opacity 0.6s ease 0.1s;
}

.overlay.active .overlay-content {
  transform: translateY(0);
  opacity: 1;
}

.drop {
  font-size: 4rem;
  margin-bottom: 1.25rem;
  display: inline-block;
  animation: float 3.5s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-10px) rotate(2deg); }
}

.overlay-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(3.5rem, 12vw, 7rem);
  line-height: 0.9;
  margin-bottom: 1.5rem;
  letter-spacing: -0.03em;
  font-variation-settings: "opsz" 144, "SOFT" 100;
}

.overlay-message {
  font-family: 'Fraunces', serif;
  font-size: 1.35rem;
  color: var(--ink-soft);
  margin-bottom: 2.75rem;
  font-style: italic;
  font-weight: 300;
}

.dismiss-btn {
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 1.05rem 2.5rem;
  font: inherit;
  font-family: 'Geist', sans-serif;
  font-size: 0.78rem;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 999px;
  transition: transform 0.25s, background 0.25s;
}

@media (hover: hover) {
  .dismiss-btn:hover {
    transform: translateY(-2px);
    background: var(--blue);
  }
}
.dismiss-btn:active { background: var(--blue); }

/* settings panel */
.settings {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--cream);
  padding: 2.25rem 2rem;
  border-top: 1px solid rgba(31, 27, 22, 0.08);
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
  z-index: 50;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.04);
}

.settings.open { transform: translateY(0); }

.settings-row {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 0.85rem;
  max-width: 500px;
  margin: 0 auto;
  flex-wrap: wrap;
}

.settings input {
  font: inherit;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.6rem;
  width: 70px;
  text-align: center;
  border: none;
  border-bottom: 1px solid var(--ink);
  background: transparent;
  color: var(--ink);
  padding: 0.25rem;
}

.settings input:focus { outline: none; border-color: var(--blue); }

.settings label {
  font-size: 0.85rem;
  color: var(--ink-soft);
  font-family: 'Fraunces', serif;
  font-style: italic;
}

.close-settings {
  position: absolute;
  top: 0.85rem;
  right: 1.25rem;
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: var(--ink-soft);
  line-height: 1;
}

@media (max-width: 600px) {
  .controls { gap: 1.5rem; font-size: 0.72rem; }
  .corner-mark, .corner-date { font-size: 0.65rem; }
  .corner-mark { top: 1.25rem; left: 1.25rem; }
  .corner-date { top: 1.25rem; right: 1.25rem; }
}

/* ========== flowers + pot ========== */
.flower-stage {
  position: relative;
  width: 480px;
  max-width: 95vw;
  height: 360px;
  margin: 0 auto 2.5rem;
}

/* the pot sits at the bottom, full width */
.pot-svg {
  position: absolute;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  width: 440px;
  max-width: 95%;
  height: 130px;
  overflow: visible;
  filter: drop-shadow(0 10px 16px rgba(31, 27, 22, 0.10));
  z-index: 5;
}

/* container for individual flower stems above the pot */
.flowers {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.stem-svg {
  position: absolute;
  bottom: 108px; /* sit on top of the soil — pot is 130px tall, soil at top ~22px from pot top */
  left: 50%;
  width: var(--w, 130px);
  height: var(--h, 280px);
  overflow: visible;
  transform: translateX(calc(-50% + var(--offset, 0px))) rotate(var(--tilt, 0deg));
  transform-origin: bottom center;
  z-index: var(--z, 3);
  animation: stemEnter 0.9s cubic-bezier(0.34, 1.4, 0.64, 1);
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1), height 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes stemEnter {
  0%   { opacity: 0; transform: translateX(calc(-50% + var(--offset, 0px))) rotate(var(--tilt, 0deg)) scaleY(0.4) translateY(40px); }
  100% { opacity: 1; transform: translateX(calc(-50% + var(--offset, 0px))) rotate(var(--tilt, 0deg)) scaleY(1) translateY(0); }
}

/* gentle idle sway per stem — random delay set inline */
.stem-inner {
  transform-origin: 50% 100%;
  animation: stemSway 7s ease-in-out infinite;
  animation-delay: var(--swayDelay, 0s);
}

@keyframes stemSway {
  0%, 100% { transform: rotate(-1.5deg); }
  50%      { transform: rotate(1.5deg); }
}

/* spring-back wiggle when watered */
.flower-stage.watered .stem-inner {
  animation: stemSway 7s ease-in-out infinite, wiggle 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes wiggle {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(-7deg); }
  45%  { transform: rotate(6deg); }
  70%  { transform: rotate(-2deg); }
  100% { transform: rotate(0deg); }
}

/* every petal, leaf, bud, stem segment is hidden by default and revealed at its stage */
.grow {
  transform-origin: var(--ox, 50%) var(--oy, 50%);
  transform: scale(0);
  opacity: 0;
  transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
}

/* stage gating — show elements up to current stage */
.stem-svg[data-stage="1"] .s1,
.stem-svg[data-stage="2"] .s1, .stem-svg[data-stage="2"] .s2,
.stem-svg[data-stage="3"] .s1, .stem-svg[data-stage="3"] .s2, .stem-svg[data-stage="3"] .s3,
.stem-svg[data-stage="4"] .s1, .stem-svg[data-stage="4"] .s2, .stem-svg[data-stage="4"] .s3, .stem-svg[data-stage="4"] .s4,
.stem-svg[data-stage="5"] .s1, .stem-svg[data-stage="5"] .s2, .stem-svg[data-stage="5"] .s3, .stem-svg[data-stage="5"] .s4, .stem-svg[data-stage="5"] .s5,
.stem-svg[data-stage="6"] .s1, .stem-svg[data-stage="6"] .s2, .stem-svg[data-stage="6"] .s3, .stem-svg[data-stage="6"] .s4, .stem-svg[data-stage="6"] .s5, .stem-svg[data-stage="6"] .s6,
.stem-svg[data-stage="7"] .s1, .stem-svg[data-stage="7"] .s2, .stem-svg[data-stage="7"] .s3, .stem-svg[data-stage="7"] .s4, .stem-svg[data-stage="7"] .s5, .stem-svg[data-stage="7"] .s6, .stem-svg[data-stage="7"] .s7,
.stem-svg[data-stage="8"] .grow {
  transform: scale(1);
  opacity: 1;
}

/* soil darkens briefly when watered */
.soil {
  transition: filter 0.4s ease;
}
.flower-stage.watered .soil {
  filter: brightness(0.55);
}

/* ====== pour animation ====== */
.droplets {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}

.droplet {
  position: absolute;
  left: 50%;
  top: 0;
  width: 8px;
  height: 12px;
  margin-left: -4px;
  background: var(--blue);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  opacity: 0;
}

.flower-stage.watered .droplet {
  animation: drop 0.95s cubic-bezier(0.55, 0, 0.7, 0.4) forwards;
}

.flower-stage.watered .droplet:nth-child(1) { animation-delay: 0.00s; }
.flower-stage.watered .droplet:nth-child(2) { animation-delay: 0.10s; left: 42%; }
.flower-stage.watered .droplet:nth-child(3) { animation-delay: 0.18s; left: 58%; }
.flower-stage.watered .droplet:nth-child(4) { animation-delay: 0.28s; }
.flower-stage.watered .droplet:nth-child(5) { animation-delay: 0.38s; left: 46%; }
.flower-stage.watered .droplet:nth-child(6) { animation-delay: 0.46s; left: 54%; }

:root { --drop-distance: 220px; --drop-end: 235px; }

@keyframes drop {
  0%   { transform: translateY(0) scaleY(0.6); opacity: 0; }
  15%  { opacity: 1; }
  85%  { transform: translateY(var(--drop-distance)) scaleY(1.2); opacity: 1; }
  100% { transform: translateY(var(--drop-end)) scaleY(0.3); opacity: 0; }
}

/* tiny splash where droplets land — sits on the soil */
.splash {
  position: absolute;
  bottom: 110px;
  left: 50%;
  width: 110px;
  height: 12px;
  margin-left: -55px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(61,107,149,0.5) 0%, transparent 70%);
  opacity: 0;
  pointer-events: none;
  z-index: 6;
}

.flower-stage.watered .splash {
  animation: splash 0.6s ease-out 0.6s;
}

@keyframes splash {
  0% { transform: scale(0.3); opacity: 0; }
  40% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1.5); opacity: 0; }
}

/* ============== MOBILE (≤ 600px) ============== */
@media (max-width: 600px) {
  .container {
    padding:
      max(1.25rem, calc(env(safe-area-inset-top) + 0.5rem))
      0.75rem
      max(1.5rem, calc(env(safe-area-inset-bottom) + 0.75rem));
    gap: 0;
  }

  .greeting { font-size: 1.05rem; margin-bottom: 0.4rem; }
  .label { font-size: 0.65rem; margin-bottom: 0.85rem; letter-spacing: 0.28em; }
  .countdown {
    font-size: clamp(4rem, 22vw, 6rem);
    margin-bottom: 0.5rem;
  }
  .subtitle { font-size: 0.95rem; margin-bottom: 1.75rem; }

  .glasses-wrap { margin-bottom: 1.5rem; }
  .glasses { gap: 0.4rem; }
  .glass { width: 16px; height: 26px; }
  .glass-hour { font-size: 0.55rem; }

  .flower-stage {
    width: 100%;
    max-width: 380px;
    height: 280px;
    margin-bottom: 1.5rem;
  }
  .pot-svg { width: 100%; max-width: 360px; height: 105px; }
  .stem-svg { bottom: 88px; }
  .splash { bottom: 92px; width: 90px; margin-left: -45px; }
  /* shorter drop distance to match smaller pot */
  html { --drop-distance: 180px; --drop-end: 195px; }

  .controls {
    gap: 1.25rem;
    font-size: 0.72rem;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 360px;
  }
  .control-btn { padding: 0.55rem 0.25rem; }

  .corner-mark, .corner-date { font-size: 0.6rem; }
  .corner-mark { top: max(0.85rem, env(safe-area-inset-top)); left: max(0.85rem, env(safe-area-inset-left)); }
  .corner-date { top: max(0.85rem, env(safe-area-inset-top)); right: max(0.85rem, env(safe-area-inset-right)); letter-spacing: 0.18em; }

  /* settings panel — extra padding for safe-area */
  .settings { padding: 1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom)); }
  .settings input { font-size: 1.4rem; width: 60px; }
  .close-settings { font-size: 1.75rem; padding: 0.5rem 0.85rem; top: 0.25rem; right: 0.5rem; }

  /* overlay popup — make sure title and message fit */
  .overlay-content { padding: 1.5rem 1.25rem; }
  .overlay-message { font-size: 1.15rem; margin-bottom: 2.25rem; }
  .dismiss-btn { padding: 1rem 2rem; font-size: 0.75rem; }
  .drop { font-size: 3rem; margin-bottom: 0.85rem; }
}

/* ============== EXTRA-NARROW (≤ 380px) ============== */
@media (max-width: 380px) {
  .glasses { gap: 0.32rem; }
  .glass { width: 14px; height: 24px; }
  .flower-stage { height: 260px; }
  .pot-svg { height: 95px; }
  .stem-svg { bottom: 80px; }
  .splash { bottom: 84px; }
}

/* ============== SHORT VIEWPORT (height-constrained) ============== */
@media (max-height: 720px) and (max-width: 600px) {
  .container { padding-top: 1rem; padding-bottom: 1rem; }
  .countdown { font-size: clamp(3rem, 16vw, 4.5rem); margin-bottom: 0.4rem; }
  .subtitle { margin-bottom: 1.25rem; font-size: 0.85rem; }
  .greeting { margin-bottom: 0.25rem; }
  .label { margin-bottom: 0.5rem; }
  .glasses-wrap { margin-bottom: 1rem; }
  .flower-stage { height: 240px; margin-bottom: 1rem; }
  .pot-svg { height: 88px; }
  .stem-svg { bottom: 74px; }
  .splash { bottom: 78px; }
}
</style>
</head>
<body>

<div class="corner-mark"><span class="dot"></span><span id="cornerName">water break</span></div>
<div class="corner-date" id="cornerDate"></div>

<div class="container">
  <div class="greeting" id="greeting"></div>
  <div class="label">next sip in</div>
  <div class="countdown" id="countdown">--:--</div>
  <div class="subtitle" id="subtitle">just a little reminder</div>

  <div class="glasses-wrap">
    <div class="glasses-caption" id="glassesCaption">today, hour by hour</div>
    <div class="glasses" id="glasses"></div>
  </div>

  <div class="flower-stage" id="flowerStage">
    <div class="droplets">
      <div class="droplet"></div>
      <div class="droplet"></div>
      <div class="droplet"></div>
      <div class="droplet"></div>
      <div class="droplet"></div>
      <div class="droplet"></div>
    </div>
    <div class="splash"></div>

<script>
const messages = [
  "hydration check",
  "your body is asking nicely",
  "small sip, big difference",
  "tap tap. water break.",
  "you're 60% water. respect that.",
  "pause. sip. resume.",
  "drink up",
  "this is your sign ✨",
  "the water is right there",
  "go on, treat yourself",
  "stay shiny",
  "one glass. easy.",
  "💧💧💧",
  "be the well-watered plant you are",
  "hydration is self respect",
  "you, but properly hydrated",
  "the glass is calling",
  "okay but really though",
  "two minutes. one glass."
];

const params = new URLSearchParams(window.location.search);
const name = params.get('name');

const greetingEl = document.getElementById('greeting');
const cornerName = document.getElementById('cornerName');
if (name) {
  greetingEl.textContent = `for ${name}`;
  cornerName.textContent = `${name}'s water log`;
}

// date in corner
const now = new Date();
const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toLowerCase();
document.getElementById('cornerDate').textContent = dateStr;

let intervalMin = parseInt(localStorage.getItem('intervalMin')) || 20;
let sipTimes = JSON.parse(localStorage.getItem('sipTimes') || '[]');
let lastReset = localStorage.getItem('lastReset');
let paused = false;
let pausedRemaining = 0;

// waking-window for the 12 hourly glasses (8am-8pm)
const WAKE_START_HOUR = 8;
const WAKE_HOURS = 12;
// per-hour fill curve: 1st sip = 35%, 2nd = 70%, 3rd+ = 100%
const HOUR_FILL_STEPS = [0, 0.35, 0.7, 1];

// reset sips each new day
const today = new Date().toDateString();
if (lastReset !== today) {
  sipTimes = [];
  localStorage.setItem('lastReset', today);
  localStorage.setItem('sipTimes', '[]');
}

// always start fresh on page load — avoids surprise popups when she comes back
let nextDue = Date.now() + intervalMin * 60 * 1000;
localStorage.setItem('nextDue', nextDue);

const countdownEl = document.getElementById('countdown');
const overlayEl = document.getElementById('overlay');
const overlayMsgEl = document.getElementById('overlayMessage');
const glassesEl = document.getElementById('glasses');
const pauseBtn = document.getElementById('pauseBtn');
const settingsBtn = document.getElementById('settingsBtn');
const resetBtn = document.getElementById('resetBtn');
const settingsEl = document.getElementById('settings');
const closeSettings = document.getElementById('closeSettings');
const intervalInput = document.getElementById('intervalInput');
const dismissBtn = document.getElementById('dismissBtn');
const sipBtn = document.getElementById('sipBtn');
const flowerStageEl = document.getElementById('flowerStage');
const flowersEl = document.getElementById('flowers');

intervalInput.value = intervalMin;

function addSip() {
  sipTimes.push(Date.now());
  localStorage.setItem('sipTimes', JSON.stringify(sipTimes));
}

function clearSips() {
  sipTimes = [];
  localStorage.setItem('sipTimes', '[]');
}

function getHourIndex(ts) {
  const d = new Date(ts);
  const h = d.getHours() + d.getMinutes() / 60;
  const i = Math.floor(h - WAKE_START_HOUR);
  return (i < 0 || i >= WAKE_HOURS) ? -1 : i;
}

function renderGlasses() {
  // bucket sips by hour-index
  const buckets = new Array(WAKE_HOURS).fill(0);
  for (const t of sipTimes) {
    const i = getHourIndex(t);
    if (i !== -1) buckets[i]++;
  }
  const nowD = new Date();
  const nowHour = nowD.getHours() + nowD.getMinutes() / 60;
  const currentIdx = Math.floor(nowHour - WAKE_START_HOUR);

  glassesEl.innerHTML = '';
  for (let i = 0; i < WAKE_HOURS; i++) {
    const hour24 = WAKE_START_HOUR + i;
    const isCurrent = i === currentIdx;
    const isPast = i < currentIdx;
    const isFuture = i > currentIdx;

    const col = document.createElement('div');
    col.className = 'glass-col' + (isCurrent ? ' current' : '');

    const g = document.createElement('div');
    g.className = 'glass';
    if (isFuture) g.classList.add('future');
    if (isPast) g.classList.add('past');
    if (isCurrent) g.classList.add('current');

    const fill = document.createElement('div');
    fill.className = 'glass-fill';
    const sipsThisHour = buckets[i];
    const pct = sipsThisHour >= HOUR_FILL_STEPS.length
      ? 1
      : HOUR_FILL_STEPS[sipsThisHour];
    fill.style.height = `${pct * 100}%`;
    g.appendChild(fill);

    // labels: show am/pm endpoints + noon + current hour for clarity, blank elsewhere
    const hourLabel = document.createElement('div');
    hourLabel.className = 'glass-hour';
    const isEndpoint = i === 0 || i === WAKE_HOURS - 1;
    const isNoon = hour24 === 12;
    if (isCurrent || isEndpoint || isNoon) {
      const hr12 = hour24 % 12 || 12;
      const suffix = hour24 < 12 ? 'a' : 'p';
      hourLabel.textContent = `${hr12}${suffix}`;
    } else {
      hourLabel.textContent = '·';
    }

    col.appendChild(g);
    col.appendChild(hourLabel);
    const hr12full = hour24 % 12 || 12;
    g.title = `${hr12full}${hour24 < 12 ? 'am' : 'pm'} — ${sipsThisHour} sip${sipsThisHour === 1 ? '' : 's'}`;
    if (isCurrent) {
      col.style.cursor = 'pointer';
      col.addEventListener('click', () => {
        addSip();
        updateAll(true);
      });
    }
    glassesEl.appendChild(col);
  }
}

// flower stages cycle 1-8; every 8 sips a new flower spawns in the pot — unlimited
const STAGES_PER_FLOWER = 8;

function flowerCount() {
  return Math.max(1, Math.ceil(sipTimes.length / STAGES_PER_FLOWER) || 1);
}

function currentFlowerStage() {
  // stage of the most recently growing flower (1-8); 0 if no sips yet
  if (sipTimes.length === 0) return 0;
  const mod = sipTimes.length % STAGES_PER_FLOWER;
  return mod === 0 ? STAGES_PER_FLOWER : mod;
}

/* ============== FLOWER TYPES ==============
   Each type is a botanical-ish illustration with:
   - palette (petal colors, center, leaf color)
   - a build(stage) function returning inner SVG markup
   Stems are drawn into a 130x280 viewBox with origin bottom-center at (65, 280).
   Stages 1-8 progressively reveal: stem segments → leaves → bud → petals → details.
============================================ */

const FLOWER_TYPES = [
  // ---- Cosmos (pink) ----
  {
    name: 'cosmos',
    palette: { petal: '#E89BB4', petalDeep: '#C76B8C', petalEdge: '#F4C5D4', center: '#E8B547', centerDeep: '#9C6E1A', leaf: '#7A9579', leafDeep: '#4F6B50', stem: '#5C7A5E' },
    build(p) {
      const cx = 65, cy = 80; // flower head center
      // 8 petals around the center, slightly elongated ovals with a soft notch
      const petals = [];
      const petalCount = 8;
      for (let k = 0; k < petalCount; k++) {
        const angle = (360 / petalCount) * k - 90;
        const stage = k < 2 ? 4 : k < 4 ? 5 : k < 6 ? 6 : 7;
        // petal as elongated ellipse rotated about (cx, cy)
        petals.push(`
          <g class="grow s${stage}" style="--ox:${cx}px;--oy:${cy}px" transform="rotate(${angle} ${cx} ${cy})">
            <path d="M ${cx} ${cy - 30}
                     C ${cx - 10} ${cy - 28}, ${cx - 8} ${cy - 8}, ${cx} ${cy - 4}
                     C ${cx + 8} ${cy - 8}, ${cx + 10} ${cy - 28}, ${cx} ${cy - 30} Z"
                  fill="${p.petal}" stroke="${p.petalDeep}" stroke-width="0.4"/>
            <path d="M ${cx} ${cy - 28} C ${cx - 4} ${cy - 24}, ${cx - 4} ${cy - 12}, ${cx} ${cy - 8}"
                  stroke="${p.petalEdge}" stroke-width="0.5" fill="none" opacity="0.7"/>
          </g>
        `);
      }
      return stemBase(p) + petals.join('') + flowerCenter(cx, cy, p, 5);
    }
  },
  // ---- Black-eyed Susan (yellow with dark center) ----
  {
    name: 'susan',
    palette: { petal: '#F5C44A', petalDeep: '#D69518', petalEdge: '#FBE08A', center: '#3A2718', centerDeep: '#1A0E04', leaf: '#7A9579', leafDeep: '#4F6B50', stem: '#5C7A5E' },
    build(p) {
      const cx = 65, cy = 80;
      const petals = [];
      const petalCount = 12;
      for (let k = 0; k < petalCount; k++) {
        const angle = (360 / petalCount) * k - 90;
        const stage = k < 3 ? 4 : k < 6 ? 5 : k < 9 ? 6 : 7;
        // narrow elongated petals, pointed tip
        petals.push(`
          <g class="grow s${stage}" style="--ox:${cx}px;--oy:${cy}px" transform="rotate(${angle} ${cx} ${cy})">
            <path d="M ${cx} ${cy - 32}
                     C ${cx - 5} ${cy - 26}, ${cx - 5} ${cy - 10}, ${cx} ${cy - 6}
                     C ${cx + 5} ${cy - 10}, ${cx + 5} ${cy - 26}, ${cx} ${cy - 32} Z"
                  fill="${p.petal}" stroke="${p.petalDeep}" stroke-width="0.4"/>
            <line x1="${cx}" y1="${cy - 28}" x2="${cx}" y2="${cy - 10}" stroke="${p.petalDeep}" stroke-width="0.3" opacity="0.6"/>
          </g>
        `);
      }
      return stemBase(p) + petals.join('') + flowerCenter(cx, cy, p, 7, true);
    }
  },
  // ---- Anemone (purple-lavender with deep navy center) ----
  {
    name: 'anemone',
    palette: { petal: '#B8A3D6', petalDeep: '#7E5FAB', petalEdge: '#D6C7E8', center: '#231840', centerDeep: '#0D0820', leaf: '#7A9579', leafDeep: '#4F6B50', stem: '#5C7A5E' },
    build(p) {
      const cx = 65, cy = 80;
      const petals = [];
      const petalCount = 6;
      for (let k = 0; k < petalCount; k++) {
        const angle = (360 / petalCount) * k - 90;
        const stage = k < 2 ? 4 : k < 4 ? 5 : 6;
        // wide rounded petals
        petals.push(`
          <g class="grow s${stage}" style="--ox:${cx}px;--oy:${cy}px" transform="rotate(${angle} ${cx} ${cy})">
            <path d="M ${cx} ${cy - 28}
                     C ${cx - 14} ${cy - 26}, ${cx - 13} ${cy - 6}, ${cx} ${cy - 2}
                     C ${cx + 13} ${cy - 6}, ${cx + 14} ${cy - 26}, ${cx} ${cy - 28} Z"
                  fill="${p.petal}" stroke="${p.petalDeep}" stroke-width="0.5"/>
            <path d="M ${cx - 8} ${cy - 22} Q ${cx} ${cy - 8}, ${cx + 8} ${cy - 22}"
                  stroke="${p.petalEdge}" stroke-width="0.4" fill="none" opacity="0.6"/>
          </g>
        `);
      }
      // small inner petal layer for s7
      const innerPetals = [];
      for (let k = 0; k < 6; k++) {
        const angle = (360 / 6) * k - 60;
        innerPetals.push(`
          <g class="grow s7" style="--ox:${cx}px;--oy:${cy}px" transform="rotate(${angle} ${cx} ${cy})">
            <ellipse cx="${cx}" cy="${cy - 12}" rx="3" ry="6" fill="${p.petalDeep}" opacity="0.7"/>
          </g>
        `);
      }
      return stemBase(p) + petals.join('') + innerPetals.join('') + flowerCenter(cx, cy, p, 6, true);
    }
  }
];

// shared stem + leaves + bud builder (stages 1-3 + 4 bud)
function stemBase(p) {
  const stemX = 65;
  const headY = 80; // where the flower attaches
  const baseY = 280;
  return `
    <!-- stem (s1) -->
    <path class="grow s1" style="--ox:${stemX}px;--oy:${baseY}px"
          d="M ${stemX} ${baseY} C ${stemX - 3} ${baseY - 80}, ${stemX + 3} ${baseY - 140}, ${stemX} ${headY}"
          stroke="${p.stem}" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <!-- left leaf (s2) -->
    <g class="grow s2" style="--ox:${stemX}px;--oy:${baseY - 90}px">
      <path d="M ${stemX} ${baseY - 90}
               C ${stemX - 22} ${baseY - 105}, ${stemX - 38} ${baseY - 95}, ${stemX - 32} ${baseY - 78}
               C ${stemX - 18} ${baseY - 80}, ${stemX - 6} ${baseY - 88}, ${stemX} ${baseY - 90} Z"
            fill="${p.leaf}" stroke="${p.leafDeep}" stroke-width="0.5"/>
      <path d="M ${stemX} ${baseY - 90} L ${stemX - 30} ${baseY - 86}"
            stroke="${p.leafDeep}" stroke-width="0.5" fill="none" opacity="0.7"/>
    </g>
    <!-- right leaf (s3) -->
    <g class="grow s3" style="--ox:${stemX}px;--oy:${baseY - 130}px">
      <path d="M ${stemX} ${baseY - 130}
               C ${stemX + 22} ${baseY - 145}, ${stemX + 38} ${baseY - 135}, ${stemX + 32} ${baseY - 118}
               C ${stemX + 18} ${baseY - 120}, ${stemX + 6} ${baseY - 128}, ${stemX} ${baseY - 130} Z"
            fill="${p.leaf}" stroke="${p.leafDeep}" stroke-width="0.5"/>
      <path d="M ${stemX} ${baseY - 130} L ${stemX + 30} ${baseY - 126}"
            stroke="${p.leafDeep}" stroke-width="0.5" fill="none" opacity="0.7"/>
    </g>
    <!-- bud / sepals (s4) — small green base under the bloom -->
    <g class="grow s4" style="--ox:${stemX}px;--oy:${headY + 6}px">
      <path d="M ${stemX - 6} ${headY + 8} Q ${stemX} ${headY - 2}, ${stemX + 6} ${headY + 8}
               Q ${stemX + 3} ${headY + 14}, ${stemX} ${headY + 14}
               Q ${stemX - 3} ${headY + 14}, ${stemX - 6} ${headY + 8} Z"
            fill="${p.leafDeep}"/>
    </g>
  `;
}

function flowerCenter(cx, cy, p, r, hasDots) {
  const dotsMarkup = hasDots ? `
    <circle class="grow s8" style="--ox:${cx}px;--oy:${cy}px" cx="${cx - 1.8}" cy="${cy - 1.5}" r="0.7" fill="${p.centerDeep}"/>
    <circle class="grow s8" style="--ox:${cx}px;--oy:${cy}px" cx="${cx + 1.6}" cy="${cy - 1}" r="0.6" fill="${p.centerDeep}"/>
    <circle class="grow s8" style="--ox:${cx}px;--oy:${cy}px" cx="${cx + 0.6}" cy="${cy + 1.8}" r="0.7" fill="${p.centerDeep}"/>
    <circle class="grow s8" style="--ox:${cx}px;--oy:${cy}px" cx="${cx - 1}" cy="${cy + 1}" r="0.5" fill="${p.centerDeep}"/>
  ` : '';
  return `
    <circle class="grow s4" style="--ox:${cx}px;--oy:${cy}px" cx="${cx}" cy="${cy}" r="${r}" fill="${p.center}"/>
    <circle class="grow s4" style="--ox:${cx}px;--oy:${cy}px" cx="${cx - 1}" cy="${cy - 1}" r="${r * 0.55}" fill="${p.centerDeep}" opacity="0.45"/>
    ${dotsMarkup}
  `;
}

// place each stem procedurally — fans across the pot, shrinks as bouquet grows.
// constraint: every stem's BASE must sit inside the soil — calibrated to actual pot width,
// so this works at any viewport (iPhone or desktop) without the bouquet overflowing.
function stemLayout(index, total, soilRadius, sizeScale) {
  // density factor: 1 stem = 1.0, scales down toward 0.55 as the bouquet fills
  const density = Math.max(0.55, 1 - Math.log(total + 1) * 0.14);

  // arrangement: alternate left/right of center, in concentric "rings" outward
  let ringIndex, side;
  if (index === 0) {
    ringIndex = 0;
    side = 0;
  } else {
    ringIndex = Math.ceil(index / 2);
    side = index % 2 === 1 ? -1 : 1;
  }

  const ringsNeeded = Math.max(1, Math.ceil((total - 1) / 2));
  const ringSpacing = Math.min(soilRadius * 0.36, soilRadius / ringsNeeded);
  const baseOffset = side * ringIndex * ringSpacing;

  // small deterministic jitter so dense bouquets feel organic
  const jitter = ringIndex === 0 ? 0 : ((Math.sin(index * 12.9898) * 43758.5453) % 1) * (soilRadius * 0.06) - (soilRadius * 0.03);
  let offset = baseOffset + jitter;
  // hard clamp so bases stay inside the soil
  offset = Math.max(-soilRadius, Math.min(soilRadius, offset));

  // tilt outward, but moderately
  const tilt = side * Math.min(12, ringIndex * 4);

  // scale combines: ring (center largest), density (more flowers = smaller), and viewport size
  const ringScale = 1 - ringIndex * 0.07;
  const scale = Math.max(0.5, ringScale * density) * sizeScale;

  // z-index: center in front, outer behind
  const z = 10 - ringIndex - (side > 0 ? 0.1 : 0);

  return { offset, tilt, scale, z };
}

function makeStemSVG(index) {
  const type = FLOWER_TYPES[index % FLOWER_TYPES.length];
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 130 280');
  svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  svg.classList.add('stem-svg');
  svg.dataset.stage = '0';
  svg.dataset.type = type.name;
  svg.dataset.index = String(index);
  svg.innerHTML = `<g class="stem-inner" style="--swayDelay:${((index % 7) * 0.6).toFixed(2)}s">${type.build(type.palette)}</g>`;
  return svg;
}

function applyStemLayout(svg, index, total) {
  // measure the actual pot width at this viewport so the bouquet adapts to mobile
  const potEl = flowerStageEl.querySelector('.pot-svg');
  const potWidth = potEl ? potEl.getBoundingClientRect().width : 440;
  // soil opening is rx=140 in viewBox 0 0 440 130 → 140/440 ≈ 0.318 of pot width
  const soilRadius = potWidth * 0.26; // a bit conservative so bases sit clearly inside soil
  // size scale: 440 is the design width; smaller pots get proportionally smaller stems
  const sizeScale = Math.min(1, potWidth / 440);

  const layout = stemLayout(index, total, soilRadius, sizeScale);
  svg.style.setProperty('--w', (130 * layout.scale) + 'px');
  svg.style.setProperty('--h', (280 * layout.scale) + 'px');
  svg.style.setProperty('--offset', layout.offset + 'px');
  svg.style.setProperty('--tilt', layout.tilt + 'deg');
  svg.style.setProperty('--z', String(layout.z));
}

function renderFlowers(animateLatest) {
  const totalFlowers = flowerCount();
  const lastStage = currentFlowerStage();

  // ensure we have the right number of stem SVGs in the DOM (additive only — keeps existing animations intact)
  const existing = flowersEl.querySelectorAll('.stem-svg');
  if (lastStage === 0) {
    flowersEl.innerHTML = '';
    return;
  }
  // remove extras if count went down (e.g., after reset)
  for (let i = existing.length - 1; i >= totalFlowers; i--) {
    existing[i].remove();
  }
  // add any missing
  for (let i = existing.length; i < totalFlowers; i++) {
    flowersEl.appendChild(makeStemSVG(i));
  }
  // set stages and re-apply layout so all stems shrink/spread as the bouquet grows
  const stems = flowersEl.querySelectorAll('.stem-svg');
  stems.forEach((s, i) => {
    const stage = i === stems.length - 1 ? lastStage : STAGES_PER_FLOWER;
    s.dataset.stage = String(stage);
    applyStemLayout(s, i, stems.length);
  });

  if (animateLatest) {
    flowerStageEl.classList.remove('watered');
    void flowerStageEl.offsetWidth;
    flowerStageEl.classList.add('watered');
    setTimeout(() => flowerStageEl.classList.remove('watered'), 1500);
  }
}

function updateAll(animate) {
  renderGlasses();
  renderFlowers(animate);
}

function formatTime(ms) {
  if (ms < 0) ms = 0;
  const total = Math.floor(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function tick() {
  if (paused) return;
  const remaining = nextDue - Date.now();
  countdownEl.textContent = formatTime(remaining);

  if (remaining <= 0 && !overlayEl.classList.contains('active')) {
    triggerPopup();
  }

  if (document.hidden && remaining <= 0) {
    document.title = '💧 water break!';
  } else if (remaining > 0) {
    document.title = `${formatTime(remaining)} • water`;
  } else {
    document.title = '💧 water break!';
  }
}

function chime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const playTone = (freq, startDelay, duration, volume) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq;
      o.type = 'sine';
      const t = ctx.currentTime + startDelay;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(volume, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + duration);
      o.start(t);
      o.stop(t + duration + 0.05);
    };
    playTone(880, 0, 1.2, 0.09);   // A5
    playTone(1318.5, 0.18, 1.4, 0.07); // E6
  } catch(e) {}
}

function triggerPopup() {
  const msg = messages[Math.floor(Math.random() * messages.length)];
  overlayMsgEl.textContent = msg;
  overlayEl.classList.add('active');
  chime();
}

dismissBtn.addEventListener('click', () => {
  overlayEl.classList.remove('active');
  addSip();
  updateAll(true);
  nextDue = Date.now() + intervalMin * 60 * 1000;
  localStorage.setItem('nextDue', nextDue);
});

pauseBtn.addEventListener('click', () => {
  if (!paused) {
    paused = true;
    pausedRemaining = nextDue - Date.now();
    pauseBtn.textContent = 'resume';
    countdownEl.style.opacity = '0.4';
  } else {
    paused = false;
    nextDue = Date.now() + Math.max(pausedRemaining, 1000);
    localStorage.setItem('nextDue', nextDue);
    pauseBtn.textContent = 'pause';
    countdownEl.style.opacity = '1';
  }
});

settingsBtn.addEventListener('click', () => {
  settingsEl.classList.toggle('open');
});

closeSettings.addEventListener('click', () => {
  settingsEl.classList.remove('open');
});

intervalInput.addEventListener('change', () => {
  const newVal = Math.max(1, Math.min(240, parseInt(intervalInput.value) || 20));
  intervalInput.value = newVal;
  intervalMin = newVal;
  localStorage.setItem('intervalMin', newVal);
  nextDue = Date.now() + newVal * 60 * 1000;
  localStorage.setItem('nextDue', nextDue);
});

resetBtn.addEventListener('click', () => {
  clearSips();
  updateAll(false);
});

sipBtn.addEventListener('click', () => {
  addSip();
  updateAll(true);
});

// keyboard: ESC closes overlay/settings
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (overlayEl.classList.contains('active')) dismissBtn.click();
    if (settingsEl.classList.contains('open')) settingsEl.classList.remove('open');
  }
});

updateAll(false);
setInterval(tick, 250);
tick();
// re-render glasses each minute so the "current hour" highlight moves with time
setInterval(renderGlasses, 60 * 1000);

// re-layout the bouquet on resize / rotate so it always fits the pot at any viewport
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const stems = flowersEl.querySelectorAll('.stem-svg');
    stems.forEach((s, i) => applyStemLayout(s, i, stems.length));
  }, 120);
});
</script>
</body>
</html>
